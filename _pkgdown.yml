url: https://zia207.github.io/RCausalML

template:
  bootstrap: 5
  bootswatch: cosmo
  bslib:
    primary: "#2C6FAC"
    headings-font-size: "1.8rem"

deploy:
  install_metadata: false

llm-docs: false

home:
  title: "RCausalML: Causal Inference with ML"
  description: >
    An R package for causal inference using machine learning.
    Estimates CATE from experimental or observational data with meta-learners,
    double machine learning, neural causal models, causal structure learning, and more.
  links:
    - text: GitHub Repository
      href: https://github.com/zia207/RCausalML
    - text: Python CausalML
      href: https://causalml.readthedocs.io/en/latest/
    - text: EconML Reference
      href: https://econml.azurewebsites.net/

navbar:
  type: default
  left:
    - text: "Get Started"
      href: articles/RCausalML-intro.html
    - text: "Reference"
      href: reference/index.html
    - text: "Tutorials"
      href: tutorials/index.html
    - text: "News"
      href: news/index.html
  right:
    - icon: fa-github fa-lg
      href: https://github.com/zia207/RCausalML
      aria-label: "GitHub repository"
    - icon: fa-book fa-lg
      href: https://causalml.readthedocs.io/en/latest/
      aria-label: "Python CausalML docs"

reference:
  - title: "Package Overview"
    desc: >
      Main package documentation and exported datasets/objects.
    contents:
      - RCausalML-package
      - rcausalml-datasets
      - rcausalml-extra-objects

  - title: "Meta-Learners"
    desc: >
      S-, T-, X-, R-, DR-, TMLE- and Domain-Adaptation learners for
      estimating the Conditional Average Treatment Effect (CATE).
    contents:
      - SLearner
      - TLearner
      - XLearner
      - RLearner
      - DRLearner
      - ForestDRLearner
      - LinearDRLearner
      - SparseLinearDRLearner
      - TMLELearner
      - DomainAdaptationLearner
      - XGBDRLearner
      - XGBDRRegressor
      - XGBRRegressor
      - XGBSRegressor
      - XGBTRegressor
      - XGBXRegressor

  - title: "Double Machine Learning (DML)"
    desc: >
      EconML-aligned DML learners for partially-linear and non-parametric
      causal effect estimation.
    contents:
      - DMLearner
      - LinearDML
      - SparseLinearDML
      - KernelDML
      - NonParamDML
      - CausalForestDML
      - DynamicDMLearner
      - r_learner_continuous

  - title: "Instrumental Variable (IV) Learners"
    desc: >
      IV and 2SLS methods including OrthoIV, DMLIV, NonParamDMLIV,
      DRIV, Boosted IV forest, and panel IV.
    contents:
      - OrthoIVLearner
      - DMLIVLearner
      - NonParamDMLIVLearner
      - driv_learner
      - iv_2sls
      - late_iv
      - BoostedIVForest
      - boosted_iv_forest
      - load_boosted_iv
      - save_boosted_iv
      - register_boosted_iv_parsnip

  - title: "DoubleML Bridges"
    desc: >
      Bridges to the DoubleML R package: partially linear regression,
      partially linear IV, DiD-style DML, and data helpers.
    contents:
      - doubleml_plr
      - doubleml_plr_fit_data
      - doubleml_plr_tune_data
      - doubleml_pliv
      - doubleml_did_linear
      - doubleml_did_eval_preds
      - doubleml_data_from_data_frame
      - doubleml_data_from_matrix
      - doubleml_fetch_401k
      - doubleml_fetch_bonus
      - doubleml_make_plr_CCDDHNR2018
      - doubleml_make_pliv_CHS2015

  - title: "Uplift Trees & Forests"
    desc: >
      Tree and forest-based uplift models using KL divergence, Euclidean
      distance, chi-squared, and continuous splitting criteria.
    contents:
      - uplift_rf_kl
      - uplift_rf_ed
      - uplift_rf_chi
      - uplift_rf_cts
      - uplift_rf_multi
      - uplift_tree_ddp
      - uplift_tree_iddp
      - causal_tree
      - causal_inference_tree
      - interaction_tree

  - title: "Causal Forests (GRF)"
    desc: >
      Wrappers and extensions around the grf package for causal,
      survival, and multi-arm forests with IV support.
    contents:
      - causal_forest
      - grf_causal_forest
      - causal_survival_forest
      - multi_arm_causal_forest
      - instrumental_forest
      - causal_forest_confounder
      - grf_average_treatment_effect
      - grf_variable_importance
      - get_forest_weights
      - get_leaf_node
      - get_tree
      - split_frequencies
      - test_calibration

  - title: "Policy Learning"
    desc: >
      DR-based policy trees and forests, and log-risk-based policy
      learners for treatment assignment.
    contents:
      - policy_learner
      - DRPolicyTree
      - DRPolicyForest
      - LRSRegressor

  - title: "CATE Interpretation"
    desc: >
      Single-tree CATE and policy interpreters plus SHAP-based explanation.
    contents:
      - SingleTreeCateInterpreter
      - SingleTreePolicyInterpreter
      - explain_cate

  - title: "Propensity Score & Matching"
    desc: >
      Propensity score estimation (GLM, glmnet, GBM) and nearest-neighbour
      and group matching with covariate balance diagnostics.
    contents:
      - compute_propensity_score
      - propensity_model
      - propensity_glm
      - propensity_glmnet
      - propensity_model_logistic_regression
      - propensity_model_elastic_net
      - propensity_model_gradient_boosted
      - nearest_neighbor_match
      - match_optimizer
      - match_by_group
      - smd
      - create_table_one
      - one_sided
      - one_sided_att
      - alignment
      - alignment_att

  - title: "Causal XGBoost"
    desc: >
      DragonNet-style two-head causal XGBoost (CXGBoost R6 class) and
      its multi-arm extension.
    contents:
      - CXGBoost
      - run_cxgboost_example
      - save_cxgboost
      - load_cxgboost
      - load_cxgboost_extensions
      - load_multi_arm_causal_boost
      - run_multi_arm_causal_boost_example
      - save_multi_arm_causal_boost

  - title: "Deep Causal Neural Networks"
    desc: >
      PyTorch/torch-based neural causal models including DragonNet, TARNet,
      CFRNet, CEVAE, DCEVAE, GANITE, CausalGAN, CausalEGM, iVAE, and
      Causal Discrepancy VAE.
    contents:
      - dragonnet
      - tarnet
      - cfrnet
      - cevae
      - ganite
      - causal_vae
      - CausalVAE
      - causalGAN
      - causal_egm
      - CausalEGM
      - causal_discrepancy_vae
      - CausalDiscrepancyVAE
      - ivae
      - interventional_elbo_loss

  - title: "Structural Causal Models (SCMs)"
    desc: >
      Deep SCMs with variational noise encoders (DeepSCM), DECI (joint
      graph + equation learning), and DAGMA-based continuous DAG estimation.
    contents:
      - dscm
      - dagma
      - dagmaLinear
      - DagmaMLP
      - demo_linear
      - demo_nonlinear_mlp
      - demo_nonlinear_sobolev

  - title: "Causal Structure Learning"
    desc: >
      NOTEARS, DAGMA, CASTLE, and the unified causalStructureML interface
      for DAG discovery from observational data.
    contents:
      - causalStructureML
      - causal_structure_ml_model_descriptions
      - notears_linear
      - notears_nonlinear
      - NOTEARS
      - castle
      - is_dag
      - simulate_dag
      - count_accuracy

  - title: "Temporal & GNN Causal Models"
    desc: >
      Neural Granger-causality (cMLP, cLSTM, EconomySRU, NRI), Temporal Causal
      VAE, and TCDF (attention-based dilated-convolution causal discovery).
    contents:
      - neural_granger_ml
      - neuralGrangerML
      - TemporalCausalVAE
      - temporal_causal_loss
      - TCDF_find_causes

  - title: "Automated Machine Learning"
    desc: >
      AutoML wrappers for nuisance and treatment-effect models with
      EconML-aligned configuration.
    contents:
      - AutomatedMLModel
      - add_automated_ml
      - set_automated_ml_workspace
      - EconAutoMLConfig
      - tune_hyperparameters

  - title: "Counterfactual & Value Estimation"
    desc: >
      Counterfactual unit selection, value estimation, and causal sensitivity
      analysis utilities.
    contents:
      - counterfactual_unit_selection
      - counterfactual_value_estimator
      - sensitivity_analysis
      - sensitivity
      - causalsens_selection_bias
      - partial_rsqs_confounding
      - loss_function

  - title: "Evaluation Metrics"
    desc: >
      PEHE, ATE error, gain and Qini curves, classification and regression
      metrics for benchmarking causal models.
    contents:
      - ATE
