format:
  html:
    theme:
      light: [cosmo, styles/custom.scss]
      dark:  [darkly,  styles/custom.scss]
    include-in-header:
      - ../pkgdown/tutorial-head-includes.html
    highlight-style: github
    code-fold: true
    code-tools: true
    code-copy: true
    code-link: true
    toc: true
    toc-depth: 3
    toc-title: "On This Page"
    number-sections: false
    smooth-scroll: true
    fig-align: center
    df-print: paged
    css: styles/custom.css

execute:
  echo: true
  warning: false
  message: false
  freeze: auto
