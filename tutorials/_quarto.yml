website:
  title: "RCausalML Tutorials"
  description: "Extended tutorial series for causal inference with machine learning in R"
  favicon: ../pkgdown/favicon/favicon.svg
  site-url: https://zia207.github.io/RCausalML/tutorials
  repo-url: https://github.com/zia207/RCausalML
  repo-actions: [edit, issue]

  navbar:
    search: true
    right:
      - text: "Package"
        href: ../index.html
      - text: "Reference"
        href: ../reference/index.html
      - icon: github
        href: https://github.com/zia207/RCausalML
        aria-label: GitHub

